<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Bart Simpson – Fils d'Homer • Tome 3</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: #f7f7ff;
      color: #222;
      line-height: 1.5;
    }

    header {
      background: #ffcc00;
      padding: 1.5rem;
      text-align: center;
      border-bottom: 4px solid #0055aa;
    }

    header h1 {
      font-size: 2rem;
      margin-bottom: 0.3rem;
    }

    header p {
      font-size: 0.95rem;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem;
      background: #0055aa;
    }

    .tab-button {
      border: none;
      padding: 0.5rem 1rem;
      background: #ffffff33;
      color: #fff;
      cursor: pointer;
      border-radius: 999px;
      font-size: 0.9rem;
      transition: background 0.2s, transform 0.1s;
    }

    .tab-button.active {
      background: #ffcc00;
      color: #222;
      font-weight: 600;
    }

    .tab-button:hover {
      background: #ffffff66;
      transform: translateY(-1px);
    }

    .toolbar {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      justify-content: center;
      flex-wrap: wrap;
      background: #e6ecff;
      border-bottom: 1px solid #ccd4ff;
    }

    #searchInput, #filterSelect {
      padding: 0.4rem 0.6rem;
      border-radius: 999px;
      border: 1px solid #ccd4ff;
      min-width: 220px;
      font-size: 0.9rem;
    }

    main {
      max-width: 1100px;
      margin: 1rem auto 2rem;
      padding: 0 1rem;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .tab-content h2 {
      margin-bottom: 0.75rem;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 0.75rem;
    }

    .card {
      background: #fff;
      border-radius: 0.75rem;
      padding: 0.75rem 0.9rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
      border: 1px solid #e0e4ff;
    }

    .card-title {
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .card-meta {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 0.4rem;
    }

    .card-text {
      font-size: 0.9rem;
    }

    .card-tag {
      display: inline-block;
      margin-top: 0.4rem;
      padding: 0.15rem 0.45rem;
      border-radius: 999px;
      background: #ffcc00;
      font-size: 0.75rem;
      font-weight: 600;
      color: #222;
    }

    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.8rem;
      color: #555;
    }
  </style>
</head>
<body>
  <header>
    <h1>Bart Simpson – Fils d'Homer</h1>
    <p>Référence numérique du tome 3 : personnages, lieux, objets et répliques.</p>
  </header>

  <nav class="tabs">
    <button class="tab-button active" data-tab="personnages">Personnages</button>
    <button class="tab-button" data-tab="lieux">Lieux</button>
    <button class="tab-button" data-tab="objets">Objets</button>
    <button class="tab-button" data-tab="repliques">Répliques drôles</button>
  </nav>

  <section class="toolbar">
    <input type="text" id="searchInput" placeholder="Rechercher... (nom, description, réplique)">
    <select id="filterSelect">
      <option value="all">Tous les éléments</option>
      <option value="personnages">Personnages</option>
      <option value="lieux">Lieux</option>
      <option value="objets">Objets</option>
      <option value="repliques">Répliques</option>
    </select>
  </section>

  <main>
    <section id="personnages" class="tab-content active">
      <h2>Personnages du tome</h2>
      <div class="cards" id="personnagesList"></div>
    </section>

    <section id="lieux" class="tab-content">
      <h2>Lieux du tome</h2>
      <div class="cards" id="lieuxList"></div>
    </section>

    <section id="objets" class="tab-content">
      <h2>Objets du tome</h2>
      <div class="cards" id="objetsList"></div>
    </section>

    <section id="repliques" class="tab-content">
      <h2>Répliques drôles du tome</h2>
      <div class="cards" id="repliquesList"></div>
    </section>
  </main>

  <footer>
    <p>Projet fan • Tome 3 : Bart Simpson – Fils d'Homer</p>
  </footer>

  <script>
    // --- Données d'exemple à remplacer par le contenu réel du tome 3 ---

    const data = {
      personnages: [
        {
          nom: "Bart Simpson",
          role: "Protagoniste",
          description: "Le fils turbulent d'Homer, au centre des gags de ce tome.",
          tags: ["Simpson", "École", "Farces"]
        },
        {
          nom: "Homer Simpson",
          role: "Père de Bart",
          description: "Père maladroit, souvent à l'origine de situations absurdes.",
          tags: ["Famille", "Duff"]
        }
      ],
      lieux: [
        {
          nom: "École élémentaire de Springfield",
          type: "École",
          description: "Lieu de nombreuses bêtises de Bart dans ce tome.",
          tags: ["École", "Springfield"]
        },
        {
          nom: "Maison des Simpson",
          type: "Maison",
          description: "Le foyer familial où se déroulent plusieurs scènes clés.",
          tags: ["Famille", "Springfield"]
        }
      ],
      objets: [
        {
          nom: "Skateboard de Bart",
          type: "Objet personnel",
          description: "Utilisé dans plusieurs gags visuels du tome.",
          tags: ["Skate", "Bart"]
        },
        {
          nom: "Télécommande TV",
          type: "Objet du salon",
          description: "Source de disputes et de gags avec Homer.",
          tags: ["Télé", "Salon"]
        }
      ],
      repliques: [
        {
          personnage: "Bart",
          texte: "Je ne l’ai pas fait, personne ne peut le prouver !",
          contexte: "Après une bêtise à l’école.",
          tags: ["École", "Déni"]
        },
        {
          personnage: "Homer",
          texte: "Mmmh… donuts.",
          contexte: "Devant une boîte de donuts alors que tout part en vrille.",
          tags: ["Donuts", "Homer"]
        }
      ]
    };

    // --- Gestion des onglets ---

    const tabButtons = document.querySelectorAll(".tab-button");
    const tabContents = document.querySelectorAll(".tab-content");

    tabButtons.forEach(button => {
      button.addEventListener("click", () => {
        const target = button.dataset.tab;

        tabButtons.forEach(b => b.classList.remove("active"));
        tabContents.forEach(c => c.classList.remove("active"));

        button.classList.add("active");
        document.getElementById(target).classList.add("active");
      });
    });

    // --- Rendu des cartes ---

    function createTagSpan(tag) {
      const span = document.createElement("span");
      span.className = "card-tag";
      span.textContent = tag;
      return span;
    }

    function renderPersonnages(list) {
      const container = document.getElementById("personnagesList");
      container.innerHTML = "";
      list.forEach(p => {
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <div class="card-title">${p.nom}</div>
          <div class="card-meta">${p.role}</div>
          <div class="card-text">${p.description}</div>
        `;
        if (p.tags && p.tags.length) {
          p.tags.forEach(t => card.appendChild(createTagSpan(t)));
        }
        container.appendChild(card);
      });
    }

    function renderLieux(list) {
      const container = document.getElementById("lieuxList");
      container.innerHTML = "";
      list.forEach(l => {
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <div class="card-title">${l.nom}</div>
          <div class="card-meta">${l.type}</div>
          <div class="card-text">${l.description}</div>
        `;
        if (l.tags && l.tags.length) {
          l.tags.forEach(t => card.appendChild(createTagSpan(t)));
        }
        container.appendChild(card);
      });
    }

    function renderObjets(list) {
      const container = document.getElementById("objetsList");
      container.innerHTML = "";
      list.forEach(o => {
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <div class="card-title">${o.nom}</div>
          <div class="card-meta">${o.type}</div>
          <div class="card-text">${o.description}</div>
        `;
        if (o.tags && o.tags.length) {
          o.tags.forEach(t => card.appendChild(createTagSpan(t)));
        }
        container.appendChild(card);
      });
    }

    function renderRepliques(list) {
      const container = document.getElementById("repliquesList");
      container.innerHTML = "";
      list.forEach(r => {
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <div class="card-title">« ${r.texte} »</div>
          <div class="card-meta">${r.personnage}</div>
          <div class="card-text">${r.contexte}</div>
        `;
        if (r.tags && r.tags.length) {
          r.tags.forEach(t => card.appendChild(createTagSpan(t)));
        }
        container.appendChild(card);
      });
    }

    // --- Recherche + filtre global ---

    const searchInput = document.getElementById("searchInput");
    const filterSelect = document.getElementById("filterSelect");

    function normalize(str) {
      return (str || "").toLowerCase();
    }

    function applyFilters() {
      const query = normalize(searchInput.value);
      const filter = filterSelect.value;

      // Personnages
      const personnagesFiltres = data.personnages.filter(p => {
        const haystack = normalize(
          p.nom + " " + p.role + " " + p.description + " " + (p.tags || []).join(" ")
        );
        return haystack.includes(query);
      });

      // Lieux
      const lieuxFiltres = data.lieux.filter(l => {
        const haystack = normalize(
          l.nom + " " + l.type + " " + l.description + " " + (l.tags || []).join(" ")
        );
        return haystack.includes(query);
      });

      // Objets
      const objetsFiltres = data.objets.filter(o => {
        const haystack = normalize(
          o.nom + " " + o.type + " " + o.description + " " + (o.tags || []).join(" ")
        );
        return haystack.includes(query);
      });

      // Répliques
      const repliquesFiltres = data.repliques.filter(r => {
        const haystack = normalize(
          r.personnage + " " + r.texte + " " + r.contexte + " " + (r.tags || []).join(" ")
        );
        return haystack.includes(query);
      });

      if (filter === "all" || filter === "personnages") {
        renderPersonnages(personnagesFiltres);
      } else {
        renderPersonnages(filter === "personnages" ? personnagesFiltres : data.personnages);
      }

      if (filter === "all" || filter === "lieux") {
        renderLieux(lieuxFiltres);
      } else {
        renderLieux(filter === "lieux" ? lieuxFiltres : data.lieux);
      }

      if (filter === "all" || filter === "objets") {
        renderObjets(objetsFiltres);
      } else {
        renderObjets(filter === "objets" ? objetsFiltres : data.objets);
      }

      if (filter === "all" || filter === "repliques") {
        renderRepliques(repliquesFiltres);
      } else {
        renderRepliques(filter === "repliques" ? repliquesFiltres : data.repliques);
      }
    }

    searchInput.addEventListener("input", applyFilters);
    filterSelect.addEventListener("change", applyFilters);

    // --- Initialisation ---

    renderPersonnages(data.personnages);
    renderLieux(data.lieux);
    renderObjets(data.objets);
    renderRepliques(data.repliques);
  </script>
</body>
</html>
